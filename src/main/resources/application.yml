server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: medai-pptx-renderer
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    default-property-inclusion: non_null

# CORS — allow Netlify origins
medai:
  cors:
    allowed-origins:
      - https://medai-dashboard.netlify.app
      - https://medai-academy.netlify.app
      - http://localhost:3000
      - http://localhost:5173

# Template config
  templates:
    default-theme: dark
    widescreen-width: 13.33
    widescreen-height: 7.5
    standard-width: 10.0
    standard-height: 7.5

management:
  endpoints:
    web:
      exposure:
        include: health,info
