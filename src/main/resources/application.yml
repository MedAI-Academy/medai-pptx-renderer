server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: medai-pptx-renderer
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
